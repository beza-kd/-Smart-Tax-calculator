<!DOCTYPE html>
<html>
<head>
    <title>Tax Calculator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;

        }
        #tax{
            border: 1px solid black;
            margin-left: 20%;
            margin-right: 20%;
            background-color: burlywood;
        }

        input, select, button {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<div id="tax">

    <body>
        <h1>tax Calculator</h1>
        <select id="taxtype">
            <option value="">select tax type</option>
            <option value="tot">TOT</option>
            <option value="vat">VAT</option>
            <option value="emp">EMP</option>
        </select>
        <input type="text" id="salary" placeholder="Enter your salary">
        <br>
        <button id="btn">Calculate</button>
        <p id="result"></p>
    </div>
        <script>
            let btn=document.getElementById("btn");
            btn.addEventListener("click",function(){
                let taxType=document.getElementById("taxtype").value;
                let salary=Number(document.getElementById("salary").value);
                let result=document.getElementById("result");

                if (taxType === "") {
                    result.innerText = "Please select a tax type";
                       return;
        }

            
            if (isNaN(salary)||salary<0){
                result.innerText="invalid tax";
                return;
            }
            let tax=0;
            if (taxType==="tot"){
                tax=0.02*salary;
            }
            else if(taxType==="vat"){
                tax=0.15*salary;
            }
            else if(taxType==="emp"){
                if(salary<600){
                    tax=0;
                }
                else{
                    if(salary<=1500){
                        tax=0.1*salary;
                    }else{
                        if(salary<=3000){
                            tax=0.2*salary;
                        }else{
                            if(salary<=7000){
                                tax=0.3*salary;
                            }else{
                                tax=0.35*salary;
                            }
                        }
                    }
                }
            }
            result.innerText="Tax ="+tax;
        })
        </script>
    </body>
</html>
